name: Docker

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main", "upstream-v0.146" ]
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker tag for build results'
        type: string
        default: manual
        required: true
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    if: github.triggering_actor != 'allcontributors[bot]'
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        # k8s cluster is linux/amd64; multi-arch (arm64) multiplies build time and was
        # starving the Actions queue. solo variant is only for optional smoke — build
        # main image first.
        variant:
          - manyfold
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Work out Docker tags
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          # GHCR requires lowercase repository names (github.repository_owner may be mixed case).
          images: ghcr.io/networkbuild3r/${{ matrix.variant }}
          tags: |
            type=raw,value=${{ inputs.tag }},event=workflow_dispatch
            type=schedule,pattern=nightly
            type=semver,pattern={{version}}
            type=ref,event=pr
            type=sha,format=long
            type=edge

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/${{ matrix.variant }}.dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ steps.docker_meta.outputs.version }}
            GIT_SHA=${{ github.sha }}
            DOCKER_TAG=${{ steps.docker_meta.outputs.tags }}

  smoke-test:
    if: github.triggering_actor != 'allcontributors[bot]' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test
        run: curl http://localhost:3214/health --fail-with-body
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: manyfold
          POSTGRES_PASSWORD: manyfold
          POSTGRES_DB: manyfold
        options: >-
          --health-cmd "pg_isready -U manyfold -d manyfold"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      manyfold:
        # Use full image (solo dropped from matrix to cut CI time); sha tag is unique per commit.
        image: ghcr.io/networkbuild3r/manyfold:sha-${{ github.sha }}
        env:
          SECRET_KEY_BASE: abc123
          DATABASE_HOST: postgres
          DATABASE_PASSWORD: manyfold
          # Skip heavy boot paths if any
          SKIP_LIBRARY_CHOWN: "1"
        options: >-
          --health-cmd "wget -q -O - http://localhost:3214/health || exit 1"
          --health-start-period 90s
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
        ports:
          - 3214:3214
