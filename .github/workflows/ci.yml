# Main CI pipeline: lint first (fast feedback), then test. DRY via composite actions.
# Trigger manually via Actions → CI → Run workflow for agent or local verification.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    if: github.triggering_actor != 'allcontributors[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/lint

  test:
    if: github.triggering_actor != 'allcontributors[bot]'
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        database_url:
          - postgresql://manyfold:manyfold@localhost:5432/manyfold
          - mysql2://manyfold:manyfold@127.0.0.1:3306/manyfold
          - sqlite3:/tmp/test.db
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RAILS_ENV: test
      DATABASE_URL: ${{ matrix.database_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/run-tests
      - name: Upload coverage
        if: secrets.CODACY_PROJECT_TOKEN != ''
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: bash <(curl -Ls https://coverage.codacy.com/get.sh) report -r coverage/coverage.xml
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: manyfold
          POSTGRES_PASSWORD: manyfold
          POSTGRES_DB: manyfold
        options: >-
          --health-cmd "pg_isready -d postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@localhost:5432/$POSTGRES_DB"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      mariadb:
        image: mariadb:11
        env:
          MARIADB_USER: manyfold
          MARIADB_PASSWORD: manyfold
          MARIADB_DATABASE: manyfold
          MARIADB_ROOT_PASSWORD: verysecret
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
