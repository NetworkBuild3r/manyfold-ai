# Build and publish spark-curate image (standalone; independent of Manyfold Rails image).
name: spark-curate

on:
  push:
    branches: [main, upstream-v0.146]
    paths:
      - "spark-curate/**"
      - ".github/workflows/spark-curate.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/networkbuild3r/spark-curate
          tags: |
            type=edge,enable={{is_default_branch}}
            type=sha,format=long
            type=raw,value=edge,enable=true
      - uses: docker/build-push-action@v6
        with:
          context: ./spark-curate
          file: ./spark-curate/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
