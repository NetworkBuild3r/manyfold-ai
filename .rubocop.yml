require:
  - standard
  - rubocop-pundit

plugins:
  - rubocop-performance
  - rubocop-capybara
  - rubocop-rails
  - rubocop-rspec
  - rubocop-rspec_rails
  - rubocop-i18n
  - rubocop-factory_bot

inherit_gem:
  standard: config/base.yml
  rswag-specs: .rubocop_rspec_alias_config.yml

AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  Exclude:
    - db/schema.rb
    - bin/bundle
    - bin/yarn
    - "node_modules/**/*"
    - "tmp/**/*"
    - "vendor/**/*"
    - ".git/**/*"

I18n/GetText:
  Enabled: false
I18n/RailsI18n:
  Enabled: true
  Exclude:
    - "spec/**/*"
    - "app/lib/cli/**/*"
Rails/Output:
  Exclude:
    - "app/lib/cli/**/*"
RSpec/NestedGroups:
  Max: 5
RSpec/MultipleMemoizedHelpers:
  Exclude:
    - "spec/requests/api/**/*"
RSpec/NoExpectationExample:
  Exclude:
    - spec/system/documentation_screenshots_spec.rb
Style/ItAssignment:
  Enabled: false

# Test bootstrap: Rails generator uses abort/exit to guard env and pending migrations.
# This is test harness code, not application code; Rails/Exit is for the latter.
Rails/Exit:
  Exclude:
    - spec/rails_helper.rb

# One scenario per example often needs several setup steps and assertions; strict
# 5-line/1-expectation limits force brittle fragmentation with no readability gain.
RSpec/ExampleLength:
  Max: 10
  Exclude:
    - spec/requests/**/*  # request specs often need more setup
RSpec/MultipleExpectations:
  Max: 6
  Exclude:
    - spec/requests/**/*

# Request/system specs describe routes, flows, or multi-class behavior, not a single
# class; DescribeClass is for unit specs where the first argument is the class under test.
RSpec/DescribeClass:
  Exclude:
    - spec/models/problems/problem_classes_spec.rb
    - spec/requests/**/*
    - spec/system/**/*

# In request specs we often don't have a handle to the exact instance being used;
# allow_any_instance_of is a pragmatic tradeoff for integration-style stubbing.
RSpec/AnyInstance:
  Exclude:
    - spec/requests/problems_spec.rb
