---
EnableDefaultLinters: true
exclude:
  - "**/vendor/**/*"
  - "**/node_modules/**/*"
  - app/views/application/_empty_state.html.erb
  - app/views/application/_problems_card.html.erb
linters:
  # Non-default linters
  PartialInstanceVariable:
    enabled: false # TODO
  DeprecatedClasses:
    enabled: true
  ErbSafety:
    enabled: true
  TrailingWhitespace:
    enabled: false # Disabled: triggers better_html location bug in some ERB (autocorrect path)
  Rubocop:
    enabled: true
    rubocop_config:
      inherit_from:
        - .rubocop.yml
      # Disable unhelpful rules for ERB templates
      Layout/InitialIndentation:
        Enabled: false # ERB tags start at unusual indentations
      Layout/TrailingEmptyLines:
        Enabled: false # We don't need a newline inside every ERB tag!
      # Temporarily disabled while we fix
      Lint/UselessAssignment:
        Enabled: false # TODO
      Style/NestedTernaryOperator:
        Enabled: false # TODO
      Rails/OutputSafety:
        Exclude:
          - app/views/layouts/application.html.erb
          - app/views/layouts/embed.html.erb
      "I18n/RailsI18n/DecorateStringFormattingUsingInterpolation":
        Exclude:
          - app/views/settings/appearance.html.erb
          - app/views/application/_problems_card.html.erb
  RequireScriptNonce:
    enabled: true
  NoUnusedDisable:
    enabled: true
