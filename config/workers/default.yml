---
# Keep default low: analysis/scan jobs can hold large file buffers. Raise via env if you have RAM.
:concurrency: <%= ENV.fetch("DEFAULT_WORKER_CONCURRENCY", 2) %>
:queues:
  - critical
  - high
  - scan
  - default
  - low
  # legacy queues kept for a while for upgrade compatibility
  - analysis
  - activity
  - upgrade
