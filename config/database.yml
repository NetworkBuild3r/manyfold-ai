default: &default
  adapter: <%= ENV.fetch("DATABASE_ADAPTER", "postgresql") %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
  database: <%= ENV.fetch("DATABASE_NAME", "manyfold") %>
  username: <%= ENV.fetch("DATABASE_USER", "manyfold") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "manyfold") %>
  pool: <%= ENV.fetch("DATABASE_POOL", 25) %>

development:
  <<: *default
  database: manyfold_development

test:
  <<: *default
  database: manyfold_test

production:
  <<: *default
