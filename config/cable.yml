development:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL") { "redis://localhost:6379/1" } %>
  channel_prefix: manyfold_development

test:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL") { Rails.application.credentials.redis_url || "redis://localhost:6379/1" } %>
  channel_prefix: manyfold_test

production:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL") { "redis://localhost:6379/1" } %>
  channel_prefix: manyfold_production
